# Build the ROSS Graphical Interface as a Windows folder bundle (PyInstaller),
# attach the ZIP to the Sphinx docs static downloads folder, optionally deploy to GitHub Pages.
#
# Configure GitHub Pages: Settings → Pages → Source = GitHub Actions.
# If Pages is not enabled, the "deploy" job fails — comment out that job or add repository rules as needed.

name: Windows interface bundle and documentation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy built HTML to GitHub Pages (requires Pages enabled for this repo)
        required: false
        default: false
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/windows-interface-and-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r apps/requirements.txt pyinstaller

      - name: Build executable (PyInstaller)
        run: pyinstaller apps/ross_interface.spec --noconfirm

      - name: Create ZIP archive
        shell: pwsh
        run: Compress-Archive -Path dist/ROSS-Interface -DestinationPath ROSS-Interface-Windows.zip -Force

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROSS-Interface-Windows
          path: ROSS-Interface-Windows.zip

  documentation:
    needs: windows-bundle
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download Windows bundle into static downloads
        uses: actions/download-artifact@v4
        with:
          name: ROSS-Interface-Windows
          path: docs/_static/downloads/

      - name: Build HTML documentation
        run: sphinx-build -b html docs docs/_build/html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-html
          path: docs/_build/html

      - name: Upload Pages artifact
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: documentation
    if: github.event_name != 'pull_request' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_pages))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

